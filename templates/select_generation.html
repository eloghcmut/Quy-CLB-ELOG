<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn quỹ Gen | Quản lý thu chi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=10">
</head>

<body class="auth-page">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card custom-card gen-select-box">
            <div class="card-header bg-dark text-white text-center">
                <h4 class="mb-0">Chọn quỹ Gen</h4>
            </div>

            <div class="card-body p-4">
                <p class="text-muted text-center mb-4">
                    Vui lòng chọn quỹ Gen bạn muốn quản lý. Mỗi Gen sẽ có dữ liệu thu chi riêng.
                </p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('select_generation') }}">
                    <div class="mb-3">
                        <label class="form-label">Quỹ Gen</label>
                        <select name="generation" class="form-select" required>
                            <option value="" disabled selected>-- Chọn Gen --</option>
                            {% for gen in gen_options %}
                                <option value="{{ gen }}">{{ gen }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        Tiếp tục
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('logout') }}" class="text-muted small">
                        Đăng xuất
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
