services:
  - type: web
    name: thu-chi-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: thu-chi-db
          property: connectionString

databases:
  - name: thu-chi-db
    databaseName: thuchi
    user: thuchi_user
    plan: free
